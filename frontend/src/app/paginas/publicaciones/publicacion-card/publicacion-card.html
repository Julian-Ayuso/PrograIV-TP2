@if (pub(); as p) {
  <article class="card">
    <header class="autor">
      @if (urlAvatar()) {
        <img class="avatar" [src]="urlAvatar()" alt="Foto de {{ p.autor.nombre }}" />
      } @else {
        <span class="avatar inicial">{{ p.autor.nombre.charAt(0) }}</span>
      }
      <div class="meta">
        <span class="nombre">{{ p.autor.nombre }} {{ p.autor.apellido }}</span>
        <span class="datos">&#64;{{ p.autor.nick }} · {{ p.createdAt | date: 'dd MMM, HH:mm' }}</span>
      </div>
      @if (puedoEliminar()) {
        <button class="borrar" (click)="pedirEliminar()" aria-label="Eliminar publicación" title="Eliminar">
          ✕
        </button>
      }
    </header>

    <h2 class="titulo">{{ p.titulo }}</h2>
    <p class="mensaje">{{ p.descripcion }}</p>

    @if (urlImagen()) {
      <img class="imagen" [src]="urlImagen()" [alt]="p.titulo" />
    }

    <footer>
      <button
        class="megusta"
        [class.activo]="leDiMeGusta()"
        [disabled]="procesando()"
        (click)="alternarMeGusta()"
      >
        <span class="corazon">{{ leDiMeGusta() ? '♥' : '♡' }}</span>
        {{ cantidad() }}
        <span class="etiqueta">{{ cantidad() === 1 ? 'me gusta' : 'me gusta' }}</span>
      </button>
    </footer>
  </article>
}
